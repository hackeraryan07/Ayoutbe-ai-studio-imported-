name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Install Gradle 8.7 ─────────────────────────────────────────
      #    AGP 8.5.2 + compileSdk 35 requires Gradle 8.7+
      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      # ── 4. Generate gradle-wrapper.jar ────────────────────────────────
      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew

      # ── 5. Build Debug APK ─────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 6. Locate APK ──────────────────────────────────────────────────
      - name: Find APK path
        run: find . -name "*.apk" -type f

      # ── 7. Upload APK artifact ─────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AYouTube-Claude-debug
          path: "**/outputs/apk/debug/*.apk"
          retention-days: 30
          if-no-files-found: error
